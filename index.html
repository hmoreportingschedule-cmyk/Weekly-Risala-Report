<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Risala Report</title>
    <style>
        :root { --primary: #008080; --hover: #005959; --bg: #e0f2f1; --light-bg: #f0faf9; }
        body { font-family: Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .form-container { background: white; width: 100%; max-width: 600px; padding: 25px; border-radius: 10px; box-shadow: 0px 5px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        .header-image { width: 100%; height: auto; border-radius: 8px; margin-bottom: 15px; display: none; }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 5px; margin-bottom: 5px; }
        .dynamic-subheading { text-align: center; color: var(--hover); font-size: 17px; font-weight: bold; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #333; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        input[readonly] { background-color: var(--light-bg); color: var(--primary); font-weight: bold; }
        .btn-submit { background-color: var(--primary); color: white; padding: 14px; border: none; width: 100%; font-size: 16px; border-radius: 5px; margin-top: 25px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        .message-box { text-align: center; padding: 30px 20px; font-size: 18px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
<div class="form-container" id="mainWrapper">
    <img id="dynamicThumbnail" src="" alt="Thumbnail" class="header-image">
    <h2 id="dynamicHeading">Loading...</h2>
    <div id="dynamicSubheading" class="dynamic-subheading"></div>
    <div id="loadingOverlay">Checking Form Status...</div>
    <div id="linkOffMessage" class="hidden message-box">Aap Ne Deri Kardi Hai Link Off Ho Chuki hai.</div>
    <div id="successMessage" class="hidden message-box">Allah Kareem Aap Ko Faizan Nasib Farmaye.</div>
    <form id="dataForm" class="hidden" onsubmit="return submitForm(event)">
        <label>Chain Select Karein:</label>
        <select id="chainType" onchange="showChainFields()" required>
            <option value="">-- Select Chain --</option>
            <option value="central">Central Chain</option>
            <option value="department">Department Chain</option>
        </select>
        <div id="all-fields" class="hidden">
            <label>Name:</label> <input type="text" id="userName" required>
            <label>Contact Number:</label> <input type="text" id="contactNumber" maxlength="10" required>
            <div id="central-fields" class="hidden">
                <label>Nigran Level:</label> 
                <select id="nigranLevel"><option value="">-- Select --</option><option>Alaqa Nigran</option><option>District/Circle Nigran</option><option>Division Nigran</option><option>Region Nigran</option><option>State Nigran</option><option>Zaili Nigran</option></select>
            </div>
            <div id="department-fields" class="hidden">
                <label>Zimmedar Level:</label> 
                <select id="zimmedarLevel"><option value="">-- Select --</option><option>City/Alaqa</option><option>District/City/Circle</option><option>Division</option><option>Gaon/Zaili Halqa</option><option>Hind Satah (HOD)/Muawwin HOD</option><option>Moallim/Imaam/Moazzin</option><option>Office/Assistant Zimmedar</option><option>Region</option><option>Rukne Hind Mushawarat</option><option>State</option></select>
                <label>Department:</label> 
                <select id="departmentList"><option value="">-- Select --</option><option>12 Maah</option><option>Al Madinatul Ilmiya</option><option>IT Department</option><option>Education Department</option><option>Faizan Weekend Islamic Classes</option><option>Faizane Madina</option><option>Haftawar Ijtema O Madani Muzakara</option><option>HR Department</option><option>Madani Courses</option><option>Majlise Rabita</option><option>Maktabatul Madina</option><option>Media Department</option><option>Property Department</option><option>Qafila Department</option><option>Roohani Ilaj</option><option>Social Media</option><option>TAD</option><option>Taqseeme Rasail</option><option>Tibbi Ilaj</option><option>Translation Department</option></select>
            </div>
            <label>Risala Report:</label> <input type="text" id="risalaReport" required>
            <label>Pincode:</label> <input type="text" id="pincode" maxlength="6" oninput="if(this.value.length === 6) fetchDistrict();" required>
            <label>District:</label> <input type="text" id="district" readonly>
            <label>Division:</label> <input type="text" id="division" readonly>
            <label>State:</label> <input type="text" id="state" readonly>
            <label>Region:</label> <input type="text" id="region" readonly>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Submit Report</button>
    </form>
</div>
