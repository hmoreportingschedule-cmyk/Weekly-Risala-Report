<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Risala Report</title>
    <style>
        /* Peacock Color Theme */
        body {
            font-family: Arial, sans-serif;
            background-color: #e0f2f1;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 128, 128, 0.3);
            border-top: 6px solid #008080;
        }
        .header-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        h2 {
            color: #008080;
            text-align: center;
            border-bottom: 2px solid #008080;
            padding-bottom: 10px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input[readonly] {
            background-color: #e8f5f5;
            color: #008080;
            font-weight: bold;
            cursor: not-allowed;
        }
        .description {
            font-size: 12px;
            color: #006666;
            margin-top: 5px;
            display: block;
            background: #f0faf9;
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #008080;
        }
        .btn-submit {
            background-color: #008080;
            color: white;
            padding: 14px;
            border: none;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
            margin-top: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit:hover {
            background-color: #005959;
        }
        .hidden {
            display: none !important;
        }
