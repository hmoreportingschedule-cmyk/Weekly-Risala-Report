<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
    .form-container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; margin-bottom: 5px; }
    p.subtitle { text-align: center; color: #666; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
    input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    button { margin-top: 20px; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
    button:disabled { background-color: #a0c4eb; cursor: not-allowed; }
    #message { margin-top: 20px; font-weight: bold; text-align: center; font-size: 15px; padding: 10px; }
    .error { color: #D8000C; background-color: #FFBABA; border-radius: 4px; display: block; padding: 10px;}
    .success { color: #4F8A10; background-color: #DFF2BF; border-radius: 4px; display: block; padding: 10px;}
  </style>
</head>
<body>

<div class="form-container">
  <h2>Reporting & Analysis Task Form</h2>
  <p class="subtitle">Daily Data Entry Form</p>
  
  <form id="dataForm" onsubmit="handleFormSubmit(event)">
    
    <label for="name">Employee Name (English only):</label>
    <input type="text" id="name" name="name" pattern="[A-Za-z\s]+" title="Sirf English alphabets allow hain" placeholder="Enter name" required>
    
    <label for="pincode">Area Pincode:</label>
    <input type="text" id="pincode" name="pincode" pattern="[0-9]{6}" maxlength="6" title="Sahi 6-digit Pincode dalein" placeholder="e.g. 422001" required>
    
    <label for="reportData">Task/Report Details (English only):</label>
    <input type="text" id="reportData" name="reportData" pattern="^[A-Za-z0-9\s.,\-_]+$" title="Sirf English text allow hai" placeholder="Enter task details..." required>

    <button type="submit" id="submitBtn">Submit Report</button>
  </form>
  
  <div id="message"></div>
</div>

<script>
  function handleFormSubmit(event) {
    event.preventDefault(); 
    var form = document.getElementById('dataForm');
    var submitBtn = document.getElementById('submitBtn');
    var messageDiv = document.getElementById('message');

    submitBtn.disabled = true;
    submitBtn.innerText = "Please wait, Submitting...";
    messageDiv.innerHTML = "";

    google.script.run
      .withSuccessHandler(function(response) {
        if(response.startsWith("Success")) {
          messageDiv.innerHTML = '<span class="success">' + response + '</span>';
          form.reset(); 
        } else {
          messageDiv.innerHTML = '<span class="error">' + response + '</span>';
        }
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Report";
      })
      .withFailureHandler(function(error) {
        messageDiv.innerHTML = '<span class="error">System Error: ' + error.message + '</span>';
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Report";
      })
      .processForm(form);
  }
</script>
</body>
</html>
